site_name: "AZ-900 Study Guide — Code with Branko"
site_description: "Complete Microsoft Azure Fundamentals (AZ-900) study guide — accessible edition"
site_url: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - "Part 1: Cloud Fundamentals":
      - "1. The Evolution of Enterprise Computing": 01-evolution.md
      - "2. Core Concepts of Cloud Computing": 02-core-concepts.md
      - "3. Cloud Deployment Models": 03-deployment-models.md
      - "4. Azure Hybrid Technologies": 04-hybrid-tech.md
      - "5. Cloud Service Models (IaaS, PaaS, SaaS)": 05-service-models.md
  - "Part 2: Azure Architecture":
      - "6. Fundamental Cloud Characteristics": 06-characteristics.md
      - "7. Geographic Distribution and Fault Tolerance": 07-geography.md
      - "8. Azure Resource Organization and Management": 08-resource-organization.md
      - "9. Core Azure Services": 09-core-services.md
  - "Part 3: Management & Governance":
      - "10. Security, Compliance, and Governance": 10-security.md
      - "11. Cost Management and Optimization": 11-cost-management.md
      - "12. AZ-900 Exam Preparation Guide": 12-exam-prep.md
  - Conclusion: conclusion.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
